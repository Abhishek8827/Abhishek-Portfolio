name: Build and publish portfolio to GitHub Pages root

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portfolio app
        run: pnpm --dir artifacts/portfolio build
        env:
          BASE_PATH: "/${{ github.event.repository.name }}/"

      - name: Copy built site to repository root
        run: |
          rm -f index.html favicon.ico robots.txt manifest.webmanifest
          rm -rf assets
          cp -R artifacts/portfolio/dist/public/* .

      - name: Commit built site to main root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A .
          if ! git diff --quiet --cached; then
            git commit -m "chore: deploy portfolio build [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
